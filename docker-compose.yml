version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_CUSTOM_EXTENSIONS=/home/node/.n8n/custom/n8n-nodes-ocrbro
    volumes:
      - n8n_data:/home/node/.n8n
      - ./docker-custom:/home/node/.n8n/custom

volumes:
  n8n_data:
